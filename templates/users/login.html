{% extends 'base.html' %}

{% block content_deslogado %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <div class="text-center">
            <span class="text-4xl">☀️</span>
            <h2 class="mt-2 text-3xl font-extrabold text-gray-950">Rede União Marken</h2>
            <p class="mt-1 text-sm text-gray-500">Portal do Consultor Solar</p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                    <input type="text" name="username" required 
                           class="w-full p-3 border border-gray-300 rounded-xl focus:ring-amber-500 focus:border-amber-500 bg-gray-50 text-gray-900">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <input type="password" name="password" required 
                           class="w-full p-3 border border-gray-300 rounded-xl focus:ring-amber-500 focus:border-amber-500 bg-gray-50 text-gray-900">
                </div>
            </div>

            {% if form.errors %}
            <div class="p-3 bg-red-50 text-red-700 text-sm rounded-xl border border-red-200 text-center">
                Usuário ou senha incorretos. Tente novamente.
            </div>
            {% endif %}

            <button type="submit" 
                    class="w-full py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-amber-500 hover:bg-amber-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-500 transition-all shadow-md">
                Entrar no Sistema
            </button>
        </form>
    </div>
</div>
{% endblock content_deslogado %}
