{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
        <h2 class="text-xl font-bold text-gray-800 mb-2 flex items-center gap-2">
            📝 Formalização de Contrato
        </h2>
        <p class="text-xs text-gray-400 mb-6">Insira os dados do contrato assinado para atualizar o status do projeto no funil.</p>

        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Número do Contrato</label>
                {{ form.numero_contrato }}
                <p class="text-[10px] text-gray-400 mt-1">Ex: CTR-2026-001</p>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Data de Assinatura</label>
                {{ form.data_assinatura }}
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Anexar Contrato Assinado (PDF)</label>
                {{ form.arquivo_contrato_pdf }}
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold p-3 rounded-xl transition-colors text-sm shadow-md">
                    💾 Confirmar e Assinar Contrato
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
