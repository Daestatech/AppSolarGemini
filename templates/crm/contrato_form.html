{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-8">
    <div class="bg-white rounded-2xl shadow-xl p-6 border-2 border-green-100">
        <div class="text-center mb-6">
            <span class="text-4xl">✍️</span>
            <h2 class="text-2xl font-bold text-gray-800 mt-2">Fechar Contrato Solar</h2>
            <p class="text-sm text-gray-500">Insira os dados de fechamento para oficializar a usina no sistema.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Número do Contrato / Identificador</label>
                <input type="text" name="numero_contrato" required placeholder="Ex: CTR-2026-9482"
                       class="w-full p-3.5 rounded-xl border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500 text-gray-900 bg-gray-50">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Data de Assinatura</label>
                <input type="date" name="data_assinatura" required value="{{ today|date:'Y-m-d' }}"
                       class="w-full p-3.5 rounded-xl border-gray-300 shadow-sm focus:ring-green-500 focus:border-green-500 text-gray-900 bg-gray-50">
            </div>

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Anexar Contrato Assinado (Opcional)</label>
                <p class="text-xs text-gray-400 mb-2">Caso já tenha o PDF digitalizado ou foto das assinaturas.</p>
                <input type="file" name="arquivo_contrato_pdf" accept="application/pdf,image/*"
                       class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 active:scale-[0.99] text-white font-bold p-4 rounded-xl transition-all shadow-lg text-lg flex justify-center items-center gap-2">
                🚀 Confirmar Venda e Ativar Projeto
            </button>
        </form>
    </div>
</div>
{% endblock %}
